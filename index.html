<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海域</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #122733;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        image-rendering: pixelated;
        touch-action: none;
        cursor: crosshair;
        display: block;
      }
      /* canvas の CSS サイズにぴったり縮むラッパー。ボタンの絶対配置の基準になり、
         リサイズで canvas が変わってもボタンが右上に自動追従する */
      #game-wrap {
        position: relative;
        line-height: 0;
      }
      #zukan-button {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 0;
        border: none;
        background: transparent;
        line-height: 0;
        cursor: pointer;
        opacity: 0.85;
      }
      #zukan-button:hover {
        opacity: 1;
        filter: brightness(1.15);
      }
      #zukan-icon {
        width: 48px;
        height: 44px;
        image-rendering: pixelated;
        display: block;
      }
      #zukan-panel {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(9, 22, 33, 0.6);
      }
      #zukan-panel[hidden] {
        display: none;
      }
      #zukan-window {
        background: rgba(18, 39, 51, 0.92);
        border: none;
        box-shadow:
          0 -3px 0 0 #3e7ea6,
          0 3px 0 0 #3e7ea6,
          -3px 0 0 0 #3e7ea6,
          3px 0 0 0 #3e7ea6;
        padding: 16px;
        color: #eaf8ff;
        font-family: "DotGothic16", sans-serif;
        text-align: center;
        max-width: min(90vw, 480px);
        max-height: 85vh;
        overflow-y: auto;
      }
      #zukan-cards {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .zukan-card {
        width: 96px;
        padding: 8px;
        border: none;
        box-shadow:
          0 -2px 0 0 rgba(194, 231, 248, 0.3),
          0 2px 0 0 rgba(194, 231, 248, 0.3),
          -2px 0 0 0 rgba(194, 231, 248, 0.3),
          2px 0 0 0 rgba(194, 231, 248, 0.3);
      }
      .zukan-sprite {
        width: 64px;
        height: 64px;
        image-rendering: pixelated;
      }
      .zukan-name {
        font-size: 13px;
        margin-top: 4px;
      }
      .zukan-meta {
        font-size: 11px;
        line-height: 1.4;
        margin-top: 4px;
        color: #c2e7f8;
        white-space: pre-line;
        min-height: 31px;
      }
      #zukan-close {
        padding: 6px 16px;
        border: none;
        box-shadow:
          0 -2px 0 0 #3e7ea6,
          0 2px 0 0 #3e7ea6,
          -2px 0 0 0 #3e7ea6,
          2px 0 0 0 #3e7ea6;
        background: transparent;
        color: #eaf8ff;
        font-family: "DotGothic16", sans-serif;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="game-wrap">
      <canvas
        id="game"
        width="128"
        height="90"
        aria-label="海域。なぞって道のりを描くと主人公が線に沿って泳ぐ"
      ></canvas>
      <button id="zukan-button" type="button" aria-label="ずかん">
        <canvas id="zukan-icon" width="12" height="11" aria-hidden="true"></canvas>
      </button>
    </div>
    <div id="zukan-panel" hidden>
      <div id="zukan-window" role="dialog" aria-modal="true" aria-label="ずかん">
        <div id="zukan-cards"></div>
        <button id="zukan-close" type="button">とじる</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
