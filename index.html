<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海域</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #122733;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        image-rendering: pixelated;
        touch-action: none;
        cursor: crosshair;
        display: block;
      }
      #zukan-button {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 20px;
        border: 1px solid #3e7ea6;
        border-radius: 6px;
        background: rgba(9, 22, 33, 0.7);
        color: #eaf8ff;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        cursor: pointer;
      }
      #zukan-panel {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(9, 22, 33, 0.6);
      }
      #zukan-panel[hidden] {
        display: none;
      }
      #zukan-window {
        background: rgba(18, 39, 51, 0.92);
        border: 1px solid #3e7ea6;
        border-radius: 8px;
        padding: 16px;
        color: #eaf8ff;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      #zukan-cards {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }
      .zukan-card {
        width: 96px;
        padding: 8px;
        border: 1px solid rgba(194, 231, 248, 0.3);
        border-radius: 6px;
      }
      .zukan-sprite {
        width: 64px;
        height: 64px;
        image-rendering: pixelated;
      }
      .zukan-name {
        font-size: 12px;
        margin-top: 4px;
      }
      .zukan-meta {
        font-size: 10px;
        margin-top: 4px;
        color: #c2e7f8;
        white-space: pre-line;
        min-height: 26px;
      }
      #zukan-close {
        padding: 6px 16px;
        border: 1px solid #3e7ea6;
        border-radius: 6px;
        background: transparent;
        color: #eaf8ff;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas
      id="game"
      width="128"
      height="90"
      aria-label="海域。なぞって道のりを描くと主人公が線に沿って泳ぐ"
    ></canvas>
    <button id="zukan-button" type="button">ずかん</button>
    <div id="zukan-panel" hidden>
      <div id="zukan-window">
        <div id="zukan-cards"></div>
        <button id="zukan-close" type="button">とじる</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
